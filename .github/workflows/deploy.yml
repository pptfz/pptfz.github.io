name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      # ===== 记录开始时间 =====
      - name: Record build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      # ===== 提取提交信息 =====
      - name: Extract commit message
        run: |
          MSG=$(git log -1 --pretty=%B | tr -d '\n' | sed 's/"/\\"/g')
          echo "COMMIT_MSG=${MSG}" >> $GITHUB_ENV

      # ===== 提取发布信息 =====
      - name: Extract release info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TYPE=Tag 发布" >> $GITHUB_ENV
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "VERSION_TAG=${TAG_NAME}" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=Branch 发布" >> $GITHUB_ENV
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "VERSION_TAG=${BRANCH_NAME}#${SHORT_SHA}" >> $GITHUB_ENV
          fi

          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_ENV
          echo "COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_ENV
          echo "RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

      # ===== 计算构建耗时 =====
      - name: Calculate build duration
        run: |
          END_TS=$(date +%s)
          DURATION=$((END_TS - BUILD_START_TS))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "BUILD_DURATION=${MIN} 分 ${SEC} 秒" >> $GITHUB_ENV

      # ===== 成功通知（企业卡片）=====
      - name: Send success notification
        if: success()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}" \
          -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"template_card\",
            \"template_card\": {
              \"card_type\": \"text_notice\",
              \"source\": {
                \"desc\": \"GitHub Actions\"
              },
              \"main_title\": {
                \"title\": \"🚀 发布成功\",
                \"desc\": \"${REPO_NAME}\"
              },
              \"emphasis_content\": {
                \"title\": \"SUCCESS\",
                \"desc\": \"构建完成\"
              },
              \"sub_title_text\": \"${COMMIT_MSG}\",
              \"horizontal_content_list\": [
                {\"keyname\": \"发布类型\", \"value\": \"${RELEASE_TYPE}\"},
                {\"keyname\": \"版本标识\", \"value\": \"${VERSION_TAG}\"},
                {\"keyname\": \"执行人员\", \"value\": \"${{ github.actor }}\"},
                {\"keyname\": \"构建耗时\", \"value\": \"${BUILD_DURATION}\"},
                {\"keyname\": \"发布时间\", \"value\": \"${TIMESTAMP}\"}
              ],
              \"jump_list\": [
                {\"type\": 1, \"title\": \"查看 Commit\", \"url\": \"${COMMIT_URL}\"},
                {\"type\": 1, \"title\": \"查看构建日志\", \"url\": \"${RUN_URL}\"}
              ]
            }
          }"

      # ===== 失败通知（企业卡片）=====
      - name: Send failure notification
        if: failure()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}" \
          -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"template_card\",
            \"template_card\": {
              \"card_type\": \"text_notice\",
              \"source\": {
                \"desc\": \"GitHub Actions\"
              },
              \"main_title\": {
                \"title\": \"❌ 发布失败\",
                \"desc\": \"${REPO_NAME}\"
              },
              \"emphasis_content\": {
                \"title\": \"FAILED\",
                \"desc\": \"构建异常\"
              },
              \"sub_title_text\": \"${COMMIT_MSG}\",
              \"horizontal_content_list\": [
                {\"keyname\": \"发布类型\", \"value\": \"${RELEASE_TYPE}\"},
                {\"keyname\": \"版本标识\", \"value\": \"${VERSION_TAG}\"},
                {\"keyname\": \"执行人员\", \"value\": \"${{ github.actor }}\"},
                {\"keyname\": \"构建耗时\", \"value\": \"${BUILD_DURATION}\"},
                {\"keyname\": \"发布时间\", \"value\": \"${TIMESTAMP}\"}
              ],
              \"jump_list\": [
                {\"type\": 1, \"title\": \"查看 Commit\", \"url\": \"${COMMIT_URL}\"},
                {\"type\": 1, \"title\": \"查看构建日志\", \"url\": \"${RUN_URL}\"}
              ]
            }
          }"
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4