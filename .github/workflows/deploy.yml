name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      # ===== 记录开始时间 =====
      - name: Record build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      # ===== 提取 commit message =====
      - name: Extract commit message
        run: echo "COMMIT_MSG=$(git log -1 --pretty=%B | tr -d '\n')" >> $GITHUB_ENV

      # ===== 计算构建耗时 =====
      - name: Calculate build duration
        run: |
          END_TS=$(date +%s)
          DURATION=$((END_TS - BUILD_START_TS))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "BUILD_DURATION=${MIN} 分 ${SEC} 秒" >> $GITHUB_ENV

      # ===== 统一通知 =====
      - name: Send notification
        if: always()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          # 获取真实 commit SHA（防止 tag 404）
          REAL_COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=${REAL_COMMIT_SHA::7}
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          # 判断成功失败
          if [ "${{ job.status }}" == "success" ]; then
            RESULT="成功"
            COLOR="info"
          else
            RESULT="失败"
            COLOR="warning"
          fi

          # 判断 branch / tag 并生成跳转链接
          if [ "${GITHUB_REF_TYPE}" == "tag" ]; then
            REF_DISPLAY="Tag 发布"
            LINK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          else
            REF_DISPLAY="Branch 发布"
            LINK_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${REAL_COMMIT_SHA}"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"markdown\",
            \"markdown\": {
              \"content\": \"**发布结果通知**\\n\\n**发布类型：** ${REF_DISPLAY}\\n\\n**申请标题：** ${COMMIT_MSG}\\n\\n**应用名称：** docusaurus\\n\\n**版本标识：** [${GITHUB_REF_NAME}#${SHORT_SHA}](${LINK_URL})\\n\\n**执行人员：** ${GITHUB_ACTOR}\\n\\n**发布结果：** <font color=\\\"${COLOR}\\\">${RESULT}</font>\\n\\n**构建耗时：** ${BUILD_DURATION}\\n\\n**发布时间：** ${TIMESTAMP}\\n\\n> 来自 GitHub Actions\"
            }
          }" \
          https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4