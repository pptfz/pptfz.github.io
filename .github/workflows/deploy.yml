name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:

  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      - name: Record build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Save metadata
        run: |
          echo "COMMIT_MSG=$(git log -1 --pretty=%B | tr -d '\n' | sed 's/"/\\"/g')" >> $GITHUB_ENV
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TYPE=Tag 发布" >> $GITHUB_ENV
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "VERSION_TAG=$TAG_NAME" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=Branch 发布" >> $GITHUB_ENV
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "VERSION_TAG=${BRANCH_NAME}#${SHORT_SHA}" >> $GITHUB_ENV
          fi

          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_ENV
          echo "COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_ENV
          echo "RUN_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

      - name: Save build duration
        run: |
          END_TS=$(date +%s)
          DURATION=$((END_TS - BUILD_START_TS))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "BUILD_DURATION=${MIN} 分 ${SEC} 秒" >> $GITHUB_ENV

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  notify:
    name: Notify WeCom
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS_TITLE="🚀 发布成功"
            STATUS_DESC="SUCCESS"
          else
            STATUS_TITLE="❌ 发布失败"
            STATUS_DESC="FAILED"
          fi

          curl -X POST "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}" \
          -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"template_card\",
            \"template_card\": {
              \"card_type\": \"text_notice\",
              \"source\": { \"desc\": \"GitHub Actions\" },
              \"main_title\": {
                \"title\": \"${STATUS_TITLE}\",
                \"desc\": \"${{ github.repository }}\"
              },
              \"emphasis_content\": {
                \"title\": \"${STATUS_DESC}\",
                \"desc\": \"构建结果\"
              },
              \"sub_title_text\": \"Commit: ${{ github.sha }}\",
              \"horizontal_content_list\": [
                {\"keyname\": \"发布类型\", \"value\": \"${RELEASE_TYPE}\"},
                {\"keyname\": \"版本标识\", \"value\": \"${VERSION_TAG}\"},
                {\"keyname\": \"执行人员\", \"value\": \"${{ github.actor }}\"},
                {\"keyname\": \"发布时间\", \"value\": \"${TIMESTAMP}\"}
              ],
              \"jump_list\": [
                {\"type\": 1, \"title\": \"查看 Commit\", \"url\": \"https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"},
                {\"type\": 1, \"title\": \"查看构建日志\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}
              ]
            }
          }"