name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      # ===== 记录开始时间 =====
      - name: Record build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        env:
          ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      # ===== 提取提交信息 =====
      - name: Extract commit message
        run: |
          MSG=$(git log -1 --pretty=%B | tr -d '\n' | sed 's/"/\\"/g')
          echo "COMMIT_MSG=${MSG}" >> $GITHUB_ENV

      # ===== 提取发布信息 =====
      - name: Extract release info
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TYPE=Tag 发布" >> $GITHUB_ENV
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "VERSION_TAG=${TAG_NAME}" >> $GITHUB_ENV
          else
            echo "RELEASE_TYPE=Branch 发布" >> $GITHUB_ENV
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            echo "VERSION_TAG=${BRANCH_NAME}#${SHORT_SHA}" >> $GITHUB_ENV
          fi

          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_ENV
          echo "COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_ENV

      # ===== 计算构建耗时 =====
      - name: Calculate build duration
        run: |
          END_TS=$(date +%s)
          DURATION=$((END_TS - BUILD_START_TS))
          MIN=$((DURATION / 60))
          SEC=$((DURATION % 60))
          echo "BUILD_DURATION=${MIN} 分 ${SEC} 秒" >> $GITHUB_ENV

      # ===== 成功通知 =====
      - name: Send success notification
        if: success()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          MESSAGE="# 🚀 发布结果通知\n\n"
          MESSAGE+="发布类型：${RELEASE_TYPE}\n\n"
          MESSAGE+="申请标题：${COMMIT_MSG}\n\n"
          MESSAGE+="应用名称：${REPO_NAME}\n\n"
          MESSAGE+="版本标识：${VERSION_TAG}\n\n"
          MESSAGE+="执行人员：${{ github.actor }}\n\n"
          MESSAGE+="发布结果：<font color=\"info\">成功</font>\n\n"
          MESSAGE+="构建耗时：${BUILD_DURATION}\n\n"
          MESSAGE+="发布时间：${TIMESTAMP}\n\n"
          MESSAGE+="🔗 [查看 Commit](${COMMIT_URL})\n\n"
          MESSAGE+="📋 查看日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          MESSAGE+="来自 GitHub Actions"

          curl -X POST -H "Content-Type: application/json" \
          -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"${MESSAGE}\"}}" \
          https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}

      # ===== 失败通知 =====
      - name: Send failure notification
        if: failure()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          MESSAGE="# ❌ 发布结果通知\n\n"
          MESSAGE+="发布类型：${RELEASE_TYPE}\n\n"
          MESSAGE+="申请标题：${COMMIT_MSG}\n\n"
          MESSAGE+="应用名称：${REPO_NAME}\n\n"
          MESSAGE+="版本标识：${VERSION_TAG}\n\n"
          MESSAGE+="执行人员：${{ github.actor }}\n\n"
          MESSAGE+="发布结果：<font color=\"warning\">失败</font>\n\n"
          MESSAGE+="构建耗时：${BUILD_DURATION}\n\n"
          MESSAGE+="发布时间：${TIMESTAMP}\n\n"
          MESSAGE+="🔗 [查看 Commit](${COMMIT_URL})\n\n"
          MESSAGE+="📋 查看日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\n"
          MESSAGE+="来自 GitHub Actions"

          curl -X POST -H "Content-Type: application/json" \
          -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"${MESSAGE}\"}}" \
          https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4