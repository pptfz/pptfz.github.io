name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      - name: Record build start time
        run: echo "BUILD_START_TS=$(date +%s)" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ===== 通知（真正部署结果）=====
      - name: Send notification
        if: always()
        env:
          WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
        run: |
          REAL_COMMIT_SHA=$(git rev-parse HEAD)
          SHORT_SHA=${REAL_COMMIT_SHA::7}
          TIMESTAMP=$(TZ=Asia/Shanghai date "+%Y-%m-%d %H:%M:%S")

          if [ "${{ job.status }}" == "success" ]; then
            RESULT="成功"
            COLOR="info"
          else
            RESULT="失败"
            COLOR="warning"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{
            \"msgtype\": \"markdown\",
            \"markdown\": {
              \"content\": \"**发布结果通知**\\n\\n**版本：** ${GITHUB_REF_NAME}#${SHORT_SHA}\\n\\n**执行人员：** ${GITHUB_ACTOR}\\n\\n**发布结果：** <font color=\\\"${COLOR}\\\">${RESULT}</font>\\n\\n**发布时间：** ${TIMESTAMP}\"
            }
          }" \
          https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=${WEBHOOK_KEY}